<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Customers - MOS Burgers</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../dashboard.css">
</head>
<body>
  <div class="app-wrapper">
    <nav class="sidebar" id="sidebar" role="navigation" aria-label="Primary navigation">
      <div class="sidebar-brand">
        <div class="brand-logo" aria-hidden="true"><span class="brand-icon">M</span></div>
        <div class="brand-text"><span class="brand-name">MOS</span><span class="brand-sub">BURGERS</span></div>
      </div>
      <ul class="nav-links">
        <li class="nav-item"><a href="../index.html" class="nav-link"><span class="nav-label">Dashboard</span></a></li>
        <li class="nav-item"><a href="store.html" class="nav-link"><span class="nav-label">Store</span></a></li>
        <li class="nav-item"><a href="orders.html" class="nav-link"><span class="nav-label">Orders</span></a></li>
        <li class="nav-item active"><a href="customers.html" class="nav-link"><span class="nav-label">Customers</span></a></li>
        <li class="nav-item"><a href="reports.html" class="nav-link"><span class="nav-label">Reports</span></a></li>
      </ul>
    </nav>

    <main id="main" class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="menu-toggle" id="menuToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
          <div class="page-title"><h1>Customers</h1></div>
        </div>
      </header>
      <div class="content-area">
        <div class="dash-card">
          <div class="section-header">
            <h2>Customer List</h2>
            <div class="action-buttons">
              <button id="showTopCustomer" class="btn btn-secondary" type="button">Show Top Customer</button>
              <button id="resetCustomerFilter" class="btn btn-secondary" type="button">Show All</button>
              <button id="showAddCustomer" class="btn btn-primary" type="button">Add Customer</button>
            </div>
          </div>
          <div class="stats-grid" style="margin-bottom:16px; grid-template-columns: 1fr 1fr;">
            <div class="stat-card glow-yellow">
              <div class="stat-info">
                <span class="stat-label">Top Customer</span>
                <span id="topCustomerName" class="stat-value">—</span>
              </div>
            </div>
            <div class="stat-card glow-red">
              <div class="stat-info">
                <span class="stat-label">Orders</span>
                <span id="topCustomerCount" class="stat-value">0</span>
              </div>
            </div>
          </div>
          <div class="table-wrapper">
            <table class="data-table" id="customersTable">
              <thead>
                <tr><th>ID</th><th>Name</th><th>Phone</th><th>Email</th><th>Joined</th><th>Actions</th></tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="dash-card" id="customerFormCard" style="display:none; margin-top:20px;">
          <div class="section-header">
            <h2 id="customerFormTitle">Add Customer</h2>
            <button id="cancelCustomer" class="btn btn-secondary" type="button">Cancel</button>
          </div>
          <form id="customerForm">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="customerId">Customer ID</label>
                <input id="customerId" class="form-control" name="id" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="customerName">Name</label>
                <input id="customerName" class="form-control" name="name" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="customerPhone">Phone</label>
                <input id="customerPhone" class="form-control" name="phone" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="customerEmail">Email</label>
                <input id="customerEmail" class="form-control" name="email" type="email" />
              </div>
            </div>
            <div class="action-buttons">
              <button class="btn btn-primary" type="submit">Save Customer</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../data.js"></script>
  <script src="../validation.js"></script>
  <script src="../app.js"></script>
  <script>
    (function () {
      const customersTable = document.querySelector('#customersTable tbody');
      const addCustomerButton = document.getElementById('showAddCustomer');
      const showTopCustomerButton = document.getElementById('showTopCustomer');
      const resetCustomerFilterButton = document.getElementById('resetCustomerFilter');
      const topCustomerName = document.getElementById('topCustomerName');
      const topCustomerCount = document.getElementById('topCustomerCount');
      const cancelCustomerButton = document.getElementById('cancelCustomer');
      const customerFormCard = document.getElementById('customerFormCard');
      const customerForm = document.getElementById('customerForm');
      const customerFormTitle = document.getElementById('customerFormTitle');
      let currentEditId = null;
      let activeCustomerFilter = null;

      const createRow = html => {
        const tr = document.createElement('tr');
        tr.innerHTML = html;
        return tr;
      };

      const getTopCustomer = () => {
        const orders = MOS.getOrders();
        if (orders.length === 0) return null;

        const counts = orders.reduce((acc, order) => {
          if (!order.customerId) return acc;
          acc[order.customerId] = (acc[order.customerId] || 0) + 1;
          return acc;
        }, {});

        const topCustomerId = Object.keys(counts).reduce((bestId, id) => {
          if (!bestId) return id;
          return counts[id] > counts[bestId] ? id : bestId;
        }, null);

        if (!topCustomerId) return null;

        const customer = MOS.getCustomers().find(c => c.id === topCustomerId);
        return customer ? { customer, orderCount: counts[topCustomerId] } : null;
      };

      const updateTopCustomerPanel = () => {
        const top = getTopCustomer();
        if (!top) {
          topCustomerName.textContent = 'No orders yet';
          topCustomerCount.textContent = '0';
          return;
        }

        topCustomerName.textContent = `${top.customer.name}`;
        topCustomerCount.textContent = `${top.orderCount}`;
      };

      const renderCustomers = () => {
        const customers = MOS.getCustomers();
        const displayCustomers = activeCustomerFilter
          ? customers.filter(customer => customer.id === activeCustomerFilter)
          : customers;

        customersTable.innerHTML = '';

        if (displayCustomers.length === 0) {
          customersTable.appendChild(createRow(`<td colspan="6" class="empty-row">No customers found.</td>`));
          return;
        }

        displayCustomers.forEach(customer => {
          const highlight = activeCustomerFilter === customer.id ? ' style="background: rgba(212, 160, 23, 0.12);"' : '';
          customersTable.appendChild(createRow(`
            <tr${highlight}>
              <td>${customer.id}</td>
              <td>${customer.name}</td>
              <td>${customer.phone}</td>
              <td>${customer.email}</td>
              <td>${MOS.formatDate(customer.joinDate)}</td>
              <td>
                <div class="action-buttons">
                  <button type="button" class="action-btn" data-action="edit" data-id="${customer.id}" aria-label="Edit customer">EDIT</button>
                  <button type="button" class="action-btn" data-action="delete" data-id="${customer.id}" aria-label="Delete customer">DELETE</button>
                </div>
              </td>
            </tr>
          `));
        });
      };

      const populateForm = customer => {
        customerForm.id.value = customer.id;
        customerForm.name.value = customer.name;
        customerForm.phone.value = customer.phone;
        customerForm.email.value = customer.email;
      };

      const showCustomerForm = customer => {
        customerFormCard.style.display = 'block';

        if (customer) {
          currentEditId = customer.id;
          customerFormTitle.textContent = 'Edit Customer';
          populateForm(customer);
          customerForm.id.disabled = true;
        } else {
          currentEditId = null;
          customerFormTitle.textContent = 'Add Customer';
          customerForm.reset();
          customerForm.id.disabled = false;
        }

        customerFormCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        customerForm.id.focus();
      };

      const hideCustomerForm = () => {
        customerFormCard.style.display = 'none';
        customerForm.reset();
        customerForm.id.disabled = false;
        currentEditId = null;
      };

      const handleCustomerAction = (id, action) => {
        const customers = MOS.getCustomers();
        const customer = customers.find(c => c.id === id);
        if (!customer) return;

        if (action === 'edit') {
          showCustomerForm(customer);
          return;
        }

        if (action === 'delete') {
          if (!confirm(`Delete customer ${customer.name}?`)) return;
          MOS.saveCustomers(customers.filter(c => c.id !== id));
          MOS.showToast('Customer deleted');
          renderCustomers();
          document.dispatchEvent(new CustomEvent('mos:dataChanged'));
        }
      };

      const getCustomerData = () => ({
        id: String(customerForm.id.value).trim(),
        name: String(customerForm.name.value).trim(),
        phone: String(customerForm.phone.value).trim(),
        email: String(customerForm.email.value).trim(),
        joinDate: new Date().toISOString().split('T')[0]
      });

      addCustomerButton.addEventListener('click', () => showCustomerForm(null));
      showTopCustomerButton.addEventListener('click', () => {
        const top = getTopCustomer();
        if (!top) {
          MOS.showToast('No customer orders found yet.', 'error');
          return;
        }
        activeCustomerFilter = top.customer.id;
        renderCustomers();
      });
      resetCustomerFilterButton.addEventListener('click', () => {
        activeCustomerFilter = null;
        renderCustomers();
      });
      cancelCustomerButton.addEventListener('click', hideCustomerForm);

      customersTable.addEventListener('click', event => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        handleCustomerAction(button.dataset.id, button.dataset.action);
      });

      customerForm.addEventListener('submit', event => {
        event.preventDefault();
        const customer = getCustomerData();
        const result = validateCustomer(customer);

        if (!result.valid) {
          MOS.showToast(result.errors.join('. '), 'error');
          return;
        }

        let customers = MOS.getCustomers();
        if (currentEditId) {
          customers = customers.map(c => c.id === currentEditId ? customer : c);
          MOS.showToast('Customer updated');
        } else {
          if (customers.some(c => c.id === customer.id)) {
            MOS.showToast('Customer ID already exists', 'error');
            return;
          }
          customers.push(customer);
          MOS.showToast('Customer added');
        }

        MOS.saveCustomers(customers);
        renderCustomers();
        hideCustomerForm();
        document.dispatchEvent(new CustomEvent('mos:dataChanged'));
      });

      document.addEventListener('DOMContentLoaded', () => {
        if (typeof MOS !== 'undefined' && MOS.seedData) MOS.seedData();
        updateTopCustomerPanel();
        renderCustomers();
      });

      document.addEventListener('mos:dataChanged', () => {
        updateTopCustomerPanel();
        renderCustomers();
      });
    })();
  </script>
</body>
</html>
