<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Store - MOS Burgers</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../dashboard.css">
</head>
<body>
  <div class="app-wrapper">
    <nav class="sidebar" id="sidebar" role="navigation" aria-label="Primary navigation">
      <div class="sidebar-brand">
        <div class="brand-logo" aria-hidden="true"><span class="brand-icon">M</span></div>
        <div class="brand-text"><span class="brand-name">MOS</span><span class="brand-sub">BURGERS</span></div>
      </div>
      <ul class="nav-links">
        <li class="nav-item"><a href="../index.html" class="nav-link"><span class="nav-label">Dashboard</span></a></li>
        <li class="nav-item active"><a href="store.html" class="nav-link"><span class="nav-label">Store</span></a></li>
        <li class="nav-item"><a href="orders.html" class="nav-link"><span class="nav-label">Orders</span></a></li>
        <li class="nav-item"><a href="customers.html" class="nav-link"><span class="nav-label">Customers</span></a></li>
        <li class="nav-item"><a href="reports.html" class="nav-link"><span class="nav-label">Reports</span></a></li>
      </ul>
    </nav>

    <main id="main" class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="menu-toggle" id="menuToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
          <div class="page-title"><h1>Store</h1></div>
        </div>
      </header>
      <div class="content-area">
        <div class="dash-card">
          <div class="section-header">
            <h2>Menu Items</h2>
            <div class="action-buttons">
              <select id="categoryFilter" class="form-control" style="max-width:180px;">
                <option value="">All Categories</option>
              </select>
              <span id="expiredCountLabel" class="status-chip" style="margin-right:12px;">Expired items: 0</span>
              <button id="removeExpiredButton" class="btn btn-secondary" type="button">Remove Expired</button>
              <button id="showAddItem" class="btn btn-primary" type="button">Add Item</button>
            </div>
          </div>
          <div class="table-wrapper">
            <table class="data-table" id="itemsTable">
              <thead>
                <tr><th>Code</th><th>Name</th><th>Category</th><th>Price</th><th>Qty</th><th>Expiry</th><th>Actions</th></tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="dash-card" id="itemFormCard" style="display:none; margin-top:20px;">
          <div class="section-header">
            <h2 id="itemFormTitle">Add New Item</h2>
            <button id="cancelItem" class="btn btn-secondary" type="button">Cancel</button>
          </div>
          <form id="itemForm">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="itemCode">Code</label>
                <input id="itemCode" class="form-control" name="code" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="itemName">Name</label>
                <input id="itemName" class="form-control" name="name" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="itemCategory">Category</label>
                <input id="itemCategory" class="form-control" name="category" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="itemPrice">Price</label>
                <input id="itemPrice" class="form-control" name="price" type="number" step="0.01" required />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label" for="itemQuantity">Quantity</label>
                <input id="itemQuantity" class="form-control" name="quantity" type="number" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="itemExpiry">Expiry Date</label>
                <input id="itemExpiry" class="form-control" name="expiryDate" type="date" />
              </div>
            </div>
            <div class="action-buttons">
              <button class="btn btn-primary" type="submit">Save Item</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="../data.js"></script>
  <script src="../validation.js"></script>
  <script src="../app.js"></script>
  <script>
    (function () {
      const itemsTable = document.querySelector('#itemsTable tbody');
      const addFormCard = document.getElementById('itemFormCard');
      const showAddButton = document.getElementById('showAddItem');
      const categoryFilter = document.getElementById('categoryFilter');
      const expiredCountLabel = document.getElementById('expiredCountLabel');
      const removeExpiredButton = document.getElementById('removeExpiredButton');
      const cancelAddButton = document.getElementById('cancelItem');
      const itemForm = document.getElementById('itemForm');
      const itemFormTitle = document.getElementById('itemFormTitle');
      let currentEditCode = null;
      let expiredNotificationDisplayed = false;

      const createRow = html => {
        const tr = document.createElement('tr');
        tr.innerHTML = html;
        return tr;
      };

      const isExpired = item => {
        if (!item.expiryDate) return false;
        const expiry = new Date(item.expiryDate + 'T23:59:59');
        return expiry < new Date();
      };

      const populateCategoryFilter = items => {
        const categories = Array.from(new Set(items.map(item => item.category || 'Uncategorized'))).sort();
        categoryFilter.innerHTML = '<option value="">All Categories</option>';
        categories.forEach(category => {
          const option = document.createElement('option');
          option.value = category;
          option.textContent = category;
          categoryFilter.appendChild(option);
        });
      };

      const updateExpiredSummary = items => {
        const expiredCount = items.filter(isExpired).length;
        expiredCountLabel.textContent = `Expired items: ${expiredCount}`;
        removeExpiredButton.disabled = expiredCount === 0;
        if (expiredCount > 0 && !expiredNotificationDisplayed) {
          MOS.showToast(`Warning: ${expiredCount} expired item(s) found.`, 'error');
          expiredNotificationDisplayed = true;
        }
        if (expiredCount === 0) {
          expiredNotificationDisplayed = false;
        }
      };

      const renderItems = () => {
        const items = MOS.getItems();
        itemsTable.innerHTML = '';

        if (items.length === 0) {
          itemsTable.appendChild(createRow(`<td colspan="7" class="empty-row">No items available.</td>`));
          updateExpiredSummary(items);
          populateCategoryFilter(items);
          return;
        }

        populateCategoryFilter(items);

        const filteredItems = categoryFilter.value
          ? items.filter(item => item.category === categoryFilter.value)
          : items;

        if (filteredItems.length === 0) {
          itemsTable.appendChild(createRow(`<td colspan="7" class="empty-row">No items in this category.</td>`));
          updateExpiredSummary(items);
          return;
        }

        const categories = Array.from(new Set(filteredItems.map(item => item.category || 'Uncategorized'))).sort();
        categories.forEach(category => {
          const categoryItems = filteredItems.filter(item => (item.category || 'Uncategorized') === category)
            .sort((a, b) => a.name.localeCompare(b.name));

          const categoryRow = createRow(`<td colspan="7">${category}</td>`);
          categoryRow.classList.add('category-row');
          itemsTable.appendChild(categoryRow);

          categoryItems.forEach(item => {
            const expired = isExpired(item);
            const expiryText = item.expiryDate ? MOS.formatDate(item.expiryDate) : 'N/A';
            const expiryLabel = expired ? `<span class="status-chip expired">EXPIRED</span>` : expiryText;
            const row = createRow(`
              <td>${item.code}</td>
              <td>${item.name}</td>
              <td>${item.category}</td>
              <td>${MOS.formatCurrency(item.price)}</td>
              <td>${item.quantity}</td>
              <td>${expiryLabel}</td>
              <td>
                <div class="action-buttons">
                  <button type="button" class="action-btn" data-action="edit" data-code="${item.code}" aria-label="Edit item">EDIT</button>
                  <button type="button" class="action-btn" data-action="delete" data-code="${item.code}" aria-label="Delete item">DELETE</button>
                </div>
              </td>
            `);
            if (expired) row.classList.add('expired-row');
            itemsTable.appendChild(row);
          });
        });

        updateExpiredSummary(items);
      };

      const populateForm = item => {
        itemForm.code.value = item.code;
        itemForm.name.value = item.name;
        itemForm.category.value = item.category;
        itemForm.price.value = item.price;
        itemForm.quantity.value = item.quantity;
        itemForm.expiryDate.value = item.expiryDate || '';
      };

      const showForm = editItem => {
        addFormCard.style.display = 'block';

        if (editItem) {
          currentEditCode = editItem.code;
          itemFormTitle.textContent = 'Edit Item';
          populateForm(editItem);
          itemForm.code.disabled = true;
        } else {
          currentEditCode = null;
          itemFormTitle.textContent = 'Add New Item';
          itemForm.reset();
          itemForm.code.disabled = false;
        }

        addFormCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
        itemForm.code.focus();
      };

      const hideForm = () => {
        addFormCard.style.display = 'none';
        itemForm.reset();
        itemForm.code.disabled = false;
        currentEditCode = null;
      };

      const handleItemAction = (code, action) => {
        const items = MOS.getItems();
        const item = items.find(i => i.code === code);
        if (!item) return;

        if (action === 'edit') {
          showForm(item);
          return;
        }

        if (action === 'delete') {
          if (!confirm(`Delete item ${item.name}?`)) return;
          MOS.saveItems(items.filter(i => i.code !== code));
          MOS.showToast('Item deleted');
          renderItems();
          document.dispatchEvent(new CustomEvent('mos:dataChanged'));
        }
      };

      const getFormItem = () => ({
        code: String(itemForm.code.value).trim(),
        name: String(itemForm.name.value).trim(),
        category: String(itemForm.category.value).trim(),
        price: Number(itemForm.price.value),
        quantity: parseInt(itemForm.quantity.value, 10),
        expiryDate: itemForm.expiryDate.value || ''
      });

      showAddButton.addEventListener('click', () => showForm(null));
      cancelAddButton.addEventListener('click', hideForm);

      itemsTable.addEventListener('click', event => {
        const button = event.target.closest('button[data-action]');
        if (!button) return;
        handleItemAction(button.dataset.code, button.dataset.action);
      });

      removeExpiredButton.addEventListener('click', () => {
        const items = MOS.getItems();
        const expiredItems = items.filter(isExpired);
        if (expiredItems.length === 0) {
          MOS.showToast('No expired items to remove.', 'error');
          return;
        }
        if (!confirm(`Remove ${expiredItems.length} expired item(s)?`)) return;
        const remaining = items.filter(item => !isExpired(item));
        MOS.saveItems(remaining);
        MOS.showToast('Expired items removed');
        renderItems();
        document.dispatchEvent(new CustomEvent('mos:dataChanged'));
      });

      categoryFilter.addEventListener('change', renderItems);

      itemForm.addEventListener('submit', event => {
        event.preventDefault();
        const item = getFormItem();
        const result = validateItem(item);

        if (!result.valid) {
          MOS.showToast(result.errors.join('. '), 'error');
          return;
        }

        let items = MOS.getItems();
        if (currentEditCode) {
          items = items.map(i => i.code === currentEditCode ? item : i);
          MOS.showToast('Item updated');
        } else {
          if (items.some(i => i.code === item.code)) {
            MOS.showToast('Item code already exists', 'error');
            return;
          }
          items.push(item);
          MOS.showToast('Item added');
        }

        MOS.saveItems(items);
        renderItems();
        hideForm();
        document.dispatchEvent(new CustomEvent('mos:dataChanged'));
      });

      document.addEventListener('DOMContentLoaded', () => {
        if (typeof MOS !== 'undefined' && MOS.seedData) MOS.seedData();
        renderItems();
      });
    })();
  </script>
</body>
</html>
