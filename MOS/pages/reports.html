<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reports - MOS Burgers</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../dashboard.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="app-wrapper">
    <nav class="sidebar" id="sidebar" role="navigation" aria-label="Primary navigation">
      <div class="sidebar-brand">
        <div class="brand-logo" aria-hidden="true"><span class="brand-icon">M</span></div>
        <div class="brand-text"><span class="brand-name">MOS</span><span class="brand-sub">BURGERS</span></div>
      </div>
      <ul class="nav-links">
        <li class="nav-item"><a href="../index.html" class="nav-link"><span class="nav-label">Dashboard</span></a></li>
        <li class="nav-item"><a href="store.html" class="nav-link"><span class="nav-label">Store</span></a></li>
        <li class="nav-item"><a href="orders.html" class="nav-link"><span class="nav-label">Orders</span></a></li>
        <li class="nav-item"><a href="customers.html" class="nav-link"><span class="nav-label">Customers</span></a></li>
        <li class="nav-item active"><a href="reports.html" class="nav-link"><span class="nav-label">Reports</span></a></li>
      </ul>
    </nav>

    <main id="main" class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button type="button" class="menu-toggle" id="menuToggle" aria-label="Toggle menu"><span></span><span></span><span></span></button>
          <div class="page-title"><h1>Reports</h1></div>
        </div>
      </header>
      <div class="content-area">
        <div class="dash-card">
          <div class="section-header">
            <h2>Monthly Sales Report</h2>
            <div class="action-buttons">
              <label class="form-label" for="reportMonth">Month</label>
              <select id="reportMonth" class="form-control" style="max-width:140px;">
                <option value="1">Jan</option>
                <option value="2">Feb</option>
                <option value="3">Mar</option>
                <option value="4">Apr</option>
                <option value="5">May</option>
                <option value="6">Jun</option>
                <option value="7">Jul</option>
                <option value="8">Aug</option>
                <option value="9">Sep</option>
                <option value="10">Oct</option>
                <option value="11">Nov</option>
                <option value="12">Dec</option>
              </select>
              <label class="form-label" for="reportYear">Year</label>
              <input id="reportYear" class="form-control" type="number" min="2020" value="2026" style="max-width:100px;" />
              <button id="loadMonthReport" class="btn btn-secondary" type="button">Load Month</button>
            </div>
          </div>
          <div class="stats-grid" id="monthReportGrid" style="margin-bottom:16px;">
          </div>
          <div class="card-header">
            <h2>Top Customers This Month</h2>
          </div>
          <div class="table-wrapper">
            <table class="data-table" id="topCustomersTable">
              <thead>
                <tr><th>Customer</th><th>Orders</th></tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="dash-card" style="margin-top:20px;">
          <div class="section-header">
            <h2>Quick Summary</h2>
            <div class="action-buttons">
              <button id="downloadAnnualReport" class="btn btn-primary" type="button">Annual Sales PDF</button>
              <button id="downloadItemCountReport" class="btn btn-secondary" type="button">Item Count PDF</button>
            </div>
          </div>
          <div class="stats-grid" id="reportsGrid">
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="../data.js"></script>
  <script src="../app.js"></script>
  <script>
    (function () {
      const getMonthlyOrders = (year, month) => {
        const orders = MOS.getOrders();
        return orders.filter(order => {
          if (!order.date) return false;
          const parts = order.date.split('-');
          if (parts.length !== 3) return false;
          return Number(parts[0]) === year && Number(parts[1]) === month;
        });
      };

      const getCustomerOrderCounts = orders => {
        return orders.reduce((acc, order) => {
          if (!order.customerId) return acc;
          acc[order.customerId] = (acc[order.customerId] || 0) + 1;
          return acc;
        }, {});
      };

      const createRow = html => {
        const tr = document.createElement('tr');
        tr.innerHTML = html;
        return tr;
      };

      const renderTopCustomersTable = (year, month) => {
        const orders = getMonthlyOrders(year, month);
        const counts = getCustomerOrderCounts(orders);
        const customers = MOS.getCustomers();
        const rows = Object.keys(counts)
          .map(id => ({ id, count: counts[id], name: (customers.find(c => c.id === id) || {}).name || id }))
          .sort((a, b) => b.count - a.count);

        const tableBody = document.querySelector('#topCustomersTable tbody');
        tableBody.innerHTML = '';
        if (rows.length === 0) {
          tableBody.appendChild(createRow('<td colspan="2" class="empty-row">No orders for this month.</td>'));
          return;
        }

        rows.forEach(row => {
          tableBody.appendChild(createRow(`
            <td>${row.name}</td>
            <td>${row.count}</td>
          `));
        });
      };

      const renderMonthReport = (year, month) => {
        const orders = getMonthlyOrders(year, month);
        const revenue = orders.reduce((sum, order) => sum + (order.finalAmount || order.total || 0), 0);
        const orderCount = orders.length;
        const customerCounts = getCustomerOrderCounts(orders);
        const topCustomerId = Object.keys(customerCounts).reduce((best, id) => {
          if (!best || customerCounts[id] > customerCounts[best]) return id;
          return best;
        }, null);
        const topCustomerName = topCustomerId ? (MOS.getCustomers().find(c => c.id === topCustomerId) || {}).name : '—';

        const grid = document.getElementById('monthReportGrid');
        grid.innerHTML = '';
        const cards = [
          { label: 'Month', value: `${month}/${year}` },
          { label: 'Sales', value: MOS.formatCurrency(revenue) },
          { label: 'Orders', value: orderCount },
          { label: 'Top Customer', value: topCustomerName }
        ];

        cards.forEach(c => {
          const div = document.createElement('div');
          div.className = 'stat-card';
          div.innerHTML = `<div class="stat-info"><span class="stat-label">${c.label}</span><span class="stat-value">${c.value}</span></div>`;
          grid.appendChild(div);
        });
      };

      const renderQuickSummary = () => {
        const items = MOS.getItems();
        const customers = MOS.getCustomers();
        const orders = MOS.getOrders();
        const totalRevenue = orders.reduce((sum, order) => sum + (order.finalAmount || order.total || 0), 0);

        const grid = document.getElementById('reportsGrid');
        grid.innerHTML = '';
        const cards = [
          { label: 'Total Items', value: items.length },
          { label: 'Customers', value: customers.length },
          { label: 'Orders', value: orders.length },
          { label: 'Revenue', value: MOS.formatCurrency(totalRevenue) }
        ];

        cards.forEach(c => {
          const div = document.createElement('div');
          div.className = 'stat-card';
          div.innerHTML = `<div class="stat-info"><span class="stat-label">${c.label}</span><span class="stat-value">${c.value}</span></div>`;
          grid.appendChild(div);
        });
      };

      const generateAnnualSalesPDF = year => {
        const { jsPDF } = window.jspdf || {};
        if (!jsPDF) return MOS.showToast('jsPDF is required for PDF export.', 'error');

        const orders = MOS.getOrders().filter(order => {
          if (!order.date) return false;
          return Number(order.date.split('-')[0]) === year;
        });
        const monthlyTotals = Array.from({ length: 12 }, (_, idx) => {
          const month = idx + 1;
          const total = orders
            .filter(order => Number(order.date.split('-')[1]) === month)
            .reduce((sum, order) => sum + (order.finalAmount || order.total || 0), 0);
          return { month, total };
        });

        const totalRevenue = monthlyTotals.reduce((sum, row) => sum + row.total, 0);
        const doc = new jsPDF({ unit: 'pt', format: 'a4' });
        let y = 40;
        doc.setFontSize(18);
        doc.text(`Annual Sales Report - ${year}`, 40, y);
        y += 30;
        doc.setFontSize(12);
        doc.text(`Total Revenue: ${MOS.formatCurrency(totalRevenue)}`, 40, y);
        y += 25;
        doc.text('Monthly Breakdown:', 40, y);
        y += 20;

        monthlyTotals.forEach(row => {
          doc.text(`${String(row.month).padStart(2, '0')} - ${MOS.formatCurrency(row.total)}`, 40, y);
          y += 18;
          if (y > 760) {
            doc.addPage();
            y = 40;
          }
        });

        doc.save(`Annual_Sales_Report_${year}.pdf`);
      };

      const generateItemCountPDF = () => {
        const { jsPDF } = window.jspdf || {};
        if (!jsPDF) return MOS.showToast('jsPDF is required for PDF export.', 'error');

        const items = MOS.getItems();
        const totalItems = items.length;
        const categories = items.reduce((acc, item) => {
          acc[item.category] = (acc[item.category] || 0) + 1;
          return acc;
        }, {});

        const doc = new jsPDF({ unit: 'pt', format: 'a4' });
        let y = 40;
        doc.setFontSize(18);
        doc.text('Food Item Count Report', 40, y);
        y += 30;
        doc.setFontSize(12);
        doc.text(`Total Food Items: ${totalItems}`, 40, y);
        y += 25;
        doc.text('Items by Category:', 40, y);
        y += 20;

        Object.keys(categories).forEach(category => {
          doc.text(`${category}: ${categories[category]}`, 40, y);
          y += 18;
          if (y > 760) {
            doc.addPage();
            y = 40;
          }
        });

        doc.save('Food_Item_Count_Report.pdf');
      };

      const monthSelect = document.getElementById('reportMonth');
      const yearInput = document.getElementById('reportYear');
      const loadMonthReportButton = document.getElementById('loadMonthReport');
      const downloadAnnualButton = document.getElementById('downloadAnnualReport');
      const downloadItemCountButton = document.getElementById('downloadItemCountReport');

      loadMonthReportButton.addEventListener('click', () => {
        const month = Number(monthSelect.value);
        const year = Number(yearInput.value);
        renderMonthReport(year, month);
        renderTopCustomersTable(year, month);
      });

      downloadAnnualButton.addEventListener('click', () => {
        const year = Number(yearInput.value);
        generateAnnualSalesPDF(year);
      });

      downloadItemCountButton.addEventListener('click', generateItemCountPDF);

      document.addEventListener('DOMContentLoaded', function(){
        if (typeof MOS !== 'undefined' && MOS.seedData) MOS.seedData();
        renderQuickSummary();
        const now = new Date();
        monthSelect.value = now.getMonth() + 1;
        yearInput.value = now.getFullYear();
        renderMonthReport(now.getFullYear(), now.getMonth() + 1);
        renderTopCustomersTable(now.getFullYear(), now.getMonth() + 1);
      });
    })();
  </script>
</body>
</html>
